name: bridgelingo
description: AI-Powered Kinyarwanda Language Learning App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- State Management & Navigation ---
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.0.0

  # --- Firebase ---
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  google_sign_in: ^6.2.1

  # --- Local Storage ---
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # --- UI ---
  google_fonts: ^6.1.0
  gap: ^3.0.0
  intl: ^0.19.0

  # --- PDF / Certificates ---
  pdf: ^3.10.4
  printing: ^5.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  riverpod_annotation: ^2.3.3

flutter:
  uses-material-design: true
  assets:
    - assets/