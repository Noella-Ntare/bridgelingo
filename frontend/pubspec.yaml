name: bridgelingo
description: AI-Powered Kinyarwanda Language Learning App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  riverpod_annotation: ^2.3.3 # Moved from dev_dependencies
  dio: ^5.3.3 # Updated version
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  google_fonts: ^6.1.0
  intl: ^0.19.0
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1 # Updated version
  path: ^1.8.3
  gap: ^3.0.0
  sqflite: ^2.3.0
  pdf: ^3.10.4
  printing: ^5.11.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  drift_dev: ^2.14.0
  riverpod_generator: ^2.3.9
  riverpod_annotation: ^2.3.3

flutter:
  uses-material-design: true
  assets:
    - assets/
